spring.application.name=ecom

# ===============================
# DATABASE (LOCAL DEV)
# ===============================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecomm}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:yana}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# FLYWAY
# ===============================

spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:migration

# ===============================
# MAIL
# ===============================

spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.protocol=smtps
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtps.auth=true

# ===============================
# ADMIN API KEY
# ===============================
# Set ADMIN_API_KEY environment variable on your server. Never commit the real value.
app.admin.api-key=${ADMIN_API_KEY:change-me-in-production}
