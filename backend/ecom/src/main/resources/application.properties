spring.application.name=ecom

# ===============================
# DATABASE (LOCAL DEV)
# ===============================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecomm}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:yana}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# FLYWAY
# ===============================

spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:migration

# ===============================
# MAIL (Brevo SMTP - free 300/day, sends to ANY email, no domain needed)
# ===============================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_LOGIN}
spring.mail.password=${BREVO_SMTP_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Admin email to receive quote notifications
app.admin.email=${ADMIN_EMAIL:yanasobti@gmail.com}

# ===============================
# ADMIN API KEY
# ===============================
# Set ADMIN_API_KEY environment variable on your server. Never commit the real value.
app.admin.api-key=${ADMIN_API_KEY:change-me-in-production}
